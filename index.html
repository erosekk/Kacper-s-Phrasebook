      {who:"you",text:"Nur ein bisschen. Danke, ich versuche mit Leuten zu sprechen.",ph:"nur ajn biszen. danke, ich ferzuche mit lojten cu szprechen",pl:"Tylko trochę. Dzięki, próbuję rozmawiać z ludźmi.",v:["Nur ein bisschen, ich versuche zu üben. – Tylko trochę, próbuję ćwiczyć.","Danke, ich möchte mit echten Leuten sprechen. (mychte mit echten lojten) – Dzięki, chcę rozmawiać z prawdziwymi ludźmi."]},
      {who:"them",text:"Wie modern! Wir sind da. Zwölf Euro.",ph:"vi modern! vir zint da. cwolf euro",pl:"Jakie nowoczesne! Jesteśmy. Dwanaście euro.",v:null},
      {who:"you",text:"Bitte sehr. Vielen Dank, einen schönen Tag!",ph:"bitte zer. filen dank, ajnen szenen tak",pl:"Proszę. Bardzo dziękuję, miłego dnia!",v:["Bitte sehr. Vielen Dank! – Proszę. Bardzo dziękuję!","Kann ich eine Quittung? Danke. (kan ich ajne kvitung) – Paragon? Dziękuję."]},
    ]},
  },
  fr:{
    omegle:{title:"Omegle",icon:"💬",desc:"Od hej do insta. Samo co najważniejsze.",lines:[
      {who:"them",text:"Salut! Comment ça va?",ph:"salu! koman sa va",pl:"Cześć! Jak się masz?",v:null},
      {who:"you",text:"Ça va bien! Et toi? Comment tu t\'appelles?",ph:"sa va bjen! e twa? koman tu tapel",pl:"Dobrze! A ty? Jak masz na imię?",v:["Ça va bien, merci! Et toi? – Dobrze, dzięki! A ty?","Très bien! Et toi? (tre bjen) – Bardzo dobrze! A ty?"]},
      {who:"them",text:"Lucas, je suis de Paris. Et toi?",ph:"Lucas, że swi de pari. e twa",pl:"Lucas, jestem z Paryża. A ty?",v:null},
      {who:"you",text:"Kacper, de Pologne, de Gdynia. Je travaille au port. J'ai visité 43 pays et j'apprends cinq ou six langues.",ph:"Kacper, de polon, de gdinia. że travaj o por. że wizite karant trwa pei e żapran senk u sis lang",pl:"Kacper, z Polski, z Gdyni. Pracuję w porcie. Byłem w 43 krajach i uczę się 5-6 języków.",v:["Le trading, c'est mon hobby. – Trading to moje hobby.","J'aimerais changer de travail. (żemre szanże de travaj) – Chciałbym zmienić pracę."]},
      {who:"them",text:"Intéressant! Hé, ton français est vraiment bien.",ph:"entersan! e, ton franse e vreman bjen",pl:"Interesujące! Hej, twój francuski jest naprawdę dobry.",v:null},
      {who:"you",text:"Merci! J\'essaie d\'apprendre le français pour parler avec des gens comme toi, comme maintenant.",ph:"mersi! żese daprandr le franse pur parle avek de żan kom twa, kom mentenan",pl:"Dziękuję! Staram się uczyć francuskiego, żeby rozmawiać z ludźmi takimi jak ty, tak jak teraz.",v:["Merci, je veux parler avec des gens comme toi. – Dzięki, chcę rozmawiać z ludźmi takimi jak ty.","Je veux pratiquer avec de vraies personnes. (że ve pratik avek de vre person) – Chcę ćwiczyć z prawdziwymi ludźmi."]},
      {who:"them",text:"Impressionnant! Tu as Instagram?",ph:"epresionan! tu a instagram",pl:"Niesamowite! Masz Instagrama?",v:null},
      {who:"you",text:"Oui! C\'est... C\'était génial de parler avec toi!",ph:"wi! se... sete żenial de parle avek twa",pl:"Tak! To... Świetnie się gadało!",v:["Oui! C\'est... C\'était génial! – Tak! To... Było genialnie!","Bien sûr! C\'est... À bientôt! (bjen sur! se... a bjento) – Jasne! To... Do zobaczenia!"]},
    ]},
    samolot:{title:"Samolot",icon:"✈️",desc:"Sąsiad zagaduje podczas lotu.",lines:[
      {who:"them",text:"Salut, t\'es d\'ici?",ph:"salu, te disi",pl:"Cześć, jesteś stąd?",v:null},
      {who:"you",text:"Non, de Pologne. Je suis en vacances. Et toi?",ph:"non, de polon. że swi an vakans. e twa",pl:"Nie, z Polski. Jestem na wakacjach. A ty?",v:["Non, de Pologne. Je suis en vacances. – Nie, z Polski. Jestem na wakacjach.","Je travaille au port de Gdynia. (o por de gdinia) – Pracuję w porcie w Gdyni."]},
      {who:"them",text:"C\'est ta première fois en France?",ph:"se ta premjer fwa an fans",pl:"Czy to twój pierwszy raz we Francji?",v:null},
      {who:"you",text:"Oui, première fois! J\'ai très envie de voir Paris.",ph:"wi, premjer fwa! że tre anvi de vwar pari",pl:"Tak, pierwszy raz! Bardzo chcę zobaczyć Paryż.",v:["Oui, première fois! J\'ai très envie. – Tak, pierwszy raz! Bardzo bym chciał.","Non, mais j\'aimerais beaucoup y aller un jour. (żemre boku i ale) – Nie, ale bardzo chciałbym się tam wybrać."]},
      {who:"them",text:"Ton français est vraiment bien!",ph:"ton franse e vreman bjen",pl:"Twój francuski jest naprawdę dobry!",v:null},
      {who:"you",text:"Juste un peu! Merci, j\'essaie de parler avec des gens comme toi.",ph:"żust un po! mersi, żese de parle avek de żan kom twa",pl:"Tylko trochę! Dzięki, próbuję rozmawiać z ludźmi takimi jak ty.",v:["Juste un peu, j\'essaie de pratiquer. – Tylko trochę, próbuję ćwiczyć.","Merci, je veux parler avec de vraies personnes. (że ve parle avek de vre person) – Dzięki, chcę rozmawiać z prawdziwymi ludźmi."]},
    ]},
    sklep:{title:"Sklep",icon:"🛒",desc:"Przy stoisku lub kasie. Szybka rozmowa.",lines:[
      {who:"them",text:"Bonjour! Je peux vous aider?",ph:"bonżur! że po vu ejde",pl:"Dzień dobry! Mogę pomóc?",v:null},
      {who:"you",text:"Bonjour, je cherche quelque chose de typique en cadeau. Qu\'est-ce que vous recommandez?",ph:"bonżur, że szerszr kelke szoz de tipik an kado. kes ke vu rekomande",pl:"Dzień dobry, szukam czegoś typowego na prezent. Co Pan poleca?",v:["Je cherche quelque chose de typique en cadeau. – Coś typowego na prezent.","Vous avez des produits locaux? (vu ave de prodwi loko) – Macie lokalne produkty?"]},
      {who:"them",text:"Bien sûr! Vous êtes touriste? Vous venez d\'où?",ph:"bjen sur! vu et turist? vu vene du",pl:"Oczywiście! Jest Pan turystą? Skąd Pan pochodzi?",v:null},
      {who:"you",text:"Oui, de Pologne. C\'est ma première fois ici.",ph:"wi, de polon. se ma premjer fwa isi",pl:"Tak, z Polski. Jestem tutaj pierwszy raz.",v:["Oui, de Pologne. Première fois ici. – Tak, z Polski. Pierwszy raz tutaj.","Oui, je viens de Gdynia, en Pologne. (że vjen de gdinia) – Tak, jestem z Gdyni w Polsce."]},
      {who:"them",text:"Super! Dix euros. Je vous l\'emballe?",ph:"super! diz euro. że vu lanbal",pl:"Super! Dziesięć euro. Mam zapakować?",v:null},
      {who:"you",text:"Oui, s\'il vous plaît. Merci!",ph:"wi, sil vu ple. mersi",pl:"Tak, proszę. Dziękuję!",v:["Oui, s\'il vous plaît. Merci! – Tak, proszę. Dzięki!","Non merci. Avez-vous un sac? (non mersi. ave vu un sak) – Nie, dziękuję. Ma Pan torbę?"]},
    ]},
    taksowka:{title:"Taksówka",icon:"🚕",desc:"Kierowca zagaduje podczas kursu.",lines:[
      {who:"them",text:"Bonjour! Au centre? Vous êtes touriste?",ph:"bonżur! o santr? vu et turist",pl:"Dzień dobry! Do centrum? Jest Pan turystą?",v:null},
      {who:"you",text:"Oui, au centre. Je viens de Pologne et c\'est ma première fois ici.",ph:"wi, o santr. że vjen de polon e se ma premjer fwa isi",pl:"Tak, do centrum. Jestem z Polski i jestem tutaj pierwszy raz.",v:["Oui, au centre. Première fois ici. – Tak, do centrum. Pierwszy raz tutaj.","Oui, je veux découvrir la ville. (że ve dekuvrir la vil) – Tak, chcę poznać miasto."]},
      {who:"them",text:"Et vous parlez français?",ph:"e vu parle franse",pl:"I mówi Pan po francusku?",v:null},
      {who:"you",text:"Juste un peu. Merci, j\'essaie de parler avec les gens.",ph:"żust un po. mersi, żese de parle avek le żan",pl:"Tylko trochę. Dzięki, próbuję rozmawiać z ludźmi.",v:["Juste un peu, j\'essaie de pratiquer. – Tylko trochę, próbuję ćwiczyć.","Merci, je veux parler avec de vraies personnes. (że ve parle avek de vre person) – Dzięki, chcę rozmawiać z prawdziwymi ludźmi."]},
      {who:"them",text:"Comme c\'est moderne! On est arrivés. Douze euros.",ph:"kom se modern! on e arive. duz euro",pl:"Jakie nowoczesne! Dotarliśmy. Dwanaście euro.",v:null},
      {who:"you",text:"Voilà. Merci beaucoup, bonne journée!",ph:"vwala. mersi boku, bon żurne",pl:"Proszę. Bardzo dziękuję, miłego dnia!",v:["Voilà. Merci beaucoup! – Proszę. Bardzo dziękuję!","Puis-je avoir un reçu? Merci. (pwi że avwar un resu) – Paragon? Dziękuję."]},
    ]},
  },
  ru:{
    omegle:{title:"Omegle",icon:"💬",desc:"Od hej do insta. Samo co najważniejsze.",lines:[
      {who:"them",text:"Привет! Как дела?",ph:"privet! kak dela",pl:"Cześć! Jak się masz?",v:null},
      {who:"you",text:"Хорошо! А у тебя? Как тебя зовут?",ph:"choroszo! a u tebja? kak tebja zovut",pl:"Dobrze! A u ciebie? Jak masz na imię?",v:["Хорошо, спасибо! А у тебя? – Dobrze, dzięki! A u ciebie?","Отлично! А у тебя? (otlichno) – Świetnie! A u ciebie?"]},
      {who:"them",text:"Артём, я из Москвы. А ты?",ph:"Artjom, ja iz moskvy. a ty",pl:"Artiom, jestem z Moskwy. A ty?",v:null},
      {who:"you",text:"Кацпер, из Польши, из Гдыни. Я работаю в порту. Я был в 43 странах и учу пять или шесть языков.",ph:"Kacper, iz polszy, iz gdyni. ja rabotaju v portu. ja byl v sorok trzech stranach i uczu pjat ili szest jazykov",pl:"Kacper, z Polski, z Gdyni. Pracuję w porcie. Byłem w 43 krajach i uczę się 5-6 języków.",v:["Трейдинг — моё хобби. – Trading to moje hobby.","Я хотел бы сменить работу. (ja chotel by smenit rabotu) – Chciałbym zmienić pracę."]},
      {who:"them",text:"Интересно! Эй, твой русский правда хороший.",ph:"interesno! ej, tvoj russkij pravda choroszij",pl:"Interesujące! Hej, twój rosyjski naprawdę dobry.",v:null},
      {who:"you",text:"Спасибо! Я стараюсь учить русский, чтобы говорить с такими людьми, как ты, как сейчас.",ph:"spasibo! ja starajus uczit russkij, sztoby govorit s takimi ludmi kak ty, kak sejczas",pl:"Dziękuję! Staram się uczyć rosyjskiego, żeby rozmawiać z ludźmi takimi jak ty, tak jak teraz.",v:["Спасибо, хочу говорить с людьми как ты. – Dzięki, chcę rozmawiać z ludźmi takimi jak ty.","Хочу практиковаться с настоящими людьми. (choczu praktikowatsia s nastojaszcimi ludmi) – Chcę ćwiczyć z prawdziwymi ludźmi."]},
      {who:"them",text:"Невероятно! Есть Инстаграм?",ph:"nievierojatno! jest instagram",pl:"Niesamowite! Masz Instagrama?",v:null},
      {who:"you",text:"Да! Мой это... Было здорово поговорить!",ph:"da! moj eto... bylo zdorovo pogovorit",pl:"Tak! Mój to... Świetnie się gadało!",v:["Да! Мой это... Было здорово! – Tak! Mój to... Było świetnie!","Конечно! Это... Пока! (koneczno! eto... poka) – Jasne! To... Cześć!"]},
    ]},
    samolot:{title:"Samolot",icon:"✈️",desc:"Sąsiad zagaduje podczas lotu.",lines:[
      {who:"them",text:"Привет, ты отсюда?",ph:"privet, ty otsjuda",pl:"Cześć, jesteś stąd?",v:null},
      {who:"you",text:"Нет, из Польши. Я здесь на отдыхе. А ты?",ph:"niet, iz polszy. ja zdies na otdychie. a ty",pl:"Nie, z Polski. Jestem tutaj na wakacjach. A ty?",v:["Нет, из Польши. Я на отдыхе. – Nie, z Polski. Jestem na wakacjach.","Я работаю в порту в Гдыне. (v portu v gdynie) – Pracuję w porcie w Gdyni."]},
      {who:"them",text:"Ты первый раз в России?",ph:"ty pervyj raz v rossii",pl:"Czy to twój pierwszy raz w Rosji?",v:null},
      {who:"you",text:"Да, первый раз! Очень хочу увидеть Москву.",ph:"da, pervyj raz! oczien choczu uwidiet moskwu",pl:"Tak, pierwszy raz! Bardzo chcę zobaczyć Moskwę.",v:["Да, первый раз! Очень хочу. – Tak, pierwszy raz! Bardzo bym chciał.","Нет, но я очень хотел бы туда поехать. (no ja oczien chotel by tuda pojechat) – Nie, ale bardzo chciałbym się tam wybrać."]},
      {who:"them",text:"Твой русский хороший!",ph:"tvoj russkij choroszij",pl:"Twój rosyjski jest dobry!",v:null},
      {who:"you",text:"Только немного! Спасибо, я стараюсь говорить с людьми как ты.",ph:"tolko nemnogo! spasibo, ja starajus govorit s ludmi kak ty",pl:"Tylko trochę! Dzięki, próbuję rozmawiać z ludźmi takimi jak ty.",v:["Только немного, стараюсь практиковаться. – Tylko trochę, próbuję ćwiczyć.","Спасибо, хочу говорить с настоящими людьми. (choczu govorit s nastojaszcimi ludmi) – Dzięki, chcę rozmawiać z prawdziwymi ludźmi."]},
    ]},
    sklep:{title:"Sklep",icon:"🛒",desc:"Przy stoisku lub kasie. Szybka rozmowa.",lines:[
      {who:"them",text:"Привет! Чем помочь?",ph:"privet! czem pomocz",pl:"Cześć! Czym pomóc?",v:null},
      {who:"you",text:"Ищу что-то типичное отсюда в подарок. Что посоветуешь?",ph:"iszczu szto-to tipichnoe otsjuda v podarok. szto posovetujeszh",pl:"Szukam czegoś typowego stąd na prezent. Co polecasz?",v:["Ищу что-то типичное в подарок. – Coś typowego na prezent.","Есть местные продукты? (jest miestnyje produkty) – Macie lokalne produkty?"]},
      {who:"them",text:"Конечно! Ты турист? Откуда?",ph:"koneczno! ty turist? otkuda",pl:"Oczywiście! Jesteś turystą? Skąd?",v:null},
      {who:"you",text:"Да, из Польши. Я здесь первый раз.",ph:"da, iz polszy. ja zdies pervyj raz",pl:"Tak, z Polski. Jestem tutaj pierwszy raz.",v:["Да, из Польши. Первый раз здесь. – Tak, z Polski. Pierwszy raz tutaj.","Да, я из Гдыни в Польше. (ja iz gdyni v polsze) – Tak, jestem z Gdyni w Polsce."]},
      {who:"them",text:"Классно! Десять евро. Упаковать?",ph:"klassno! diesjat evro. upakowat",pl:"Super! Dziesięć euro. Zapakować?",v:null},
      {who:"you",text:"Да, пожалуйста. Спасибо!",ph:"da, pożalujsta. spasibo",pl:"Tak, proszę. Dziękuję!",v:["Да, пожалуйста. Спасибо! – Tak, proszę. Dziękuję!","Нет, спасибо. Есть пакет? (niet, spasibo. jest paket) – Nie, dziękuję. Torba?"]},
    ]},
    taksowka:{title:"Taksówka",icon:"🚕",desc:"Kierowca zagaduje podczas kursu.",lines:[
      {who:"them",text:"Привет! В центр? Ты турист?",ph:"privet! v centr? ty turist",pl:"Cześć! Do centrum? Jesteś turystą?",v:null},
      {who:"you",text:"Да, в центр. Я из Польши и здесь первый раз.",ph:"da, v centr. ja iz polszy i zdies pervyj raz",pl:"Tak, do centrum. Jestem z Polski i jestem tutaj pierwszy raz.",v:["Да, в центр. Первый раз здесь. – Tak, do centrum. Pierwszy raz tutaj.","Да, хочу посмотреть город. (choczu posmotret gorod) – Tak, chcę poznać miasto."]},
      {who:"them",text:"Говоришь по-русски?",ph:"goworiszh po-russki",pl:"Mówisz po rosyjsku?",v:null},
      {who:"you",text:"Только немного. Спасибо, я стараюсь говорить с людьми.",ph:"tolko nemnogo. spasibo, ja starajus govorit s ludmi",pl:"Tylko trochę. Dzięki, próbuję rozmawiać z ludźmi.",v:["Только немного, стараюсь практиковаться. – Tylko trochę, próbuję ćwiczyć.","Спасибо, хочу говорить с настоящими людьми. (choczu govorit s nastojaszcimi ludmi) – Dzięki, chcę rozmawiać z prawdziwymi ludźmi."]},
      {who:"them",text:"Как современно! Приехали. Двенадцать евро.",ph:"kak sovriemienno! prijechali. dvenadcat evro",pl:"Jakie nowoczesne! Dotarliśmy. Dwanaście euro.",v:null},
      {who:"you",text:"Пожалуйста. Спасибо, хорошего дня!",ph:"pożalujsta. spasibo, choroszego dnja",pl:"Proszę. Dziękuję, miłego dnia!",v:["Пожалуйста. Спасибо! – Proszę. Dziękuję!","Можно чек? Спасибо. (możno czek) – Paragon? Dziękuję."]},
    ]},
  },
  it:{
    omegle:{title:"Omegle",icon:"💬",desc:"Od hej do insta. Samo co najważniejsze.",lines:[
      {who:"them",text:"Ciao! Come stai?",ph:"czao! kome staj",pl:"Cześć! Jak się masz?",v:null},
      {who:"you",text:"Bene! E tu? Come ti chiami?",ph:"bene! e tu? kome ti kjami",pl:"Dobrze! A ty? Jak masz na imię?",v:["Bene, grazie! E tu? – Dobrze, dzięki! A ty?","Molto bene! E tu? (molto bene) – Bardzo dobrze! A ty?"]},
      {who:"them",text:"Marco, sono di Roma. E tu?",ph:"Marco, sono di roma. e tu",pl:"Marco, jestem z Rzymu. A ty?",v:null},
      {who:"you",text:"Kacper, dalla Polonia, da Gdynia. Lavoro al porto. Sono stato in 43 paesi e sto imparando cinque o sei lingue.",ph:"Kacper, dalla polonia, da gdinia. lavoro al porto. sono stato in kuaranta tre paezi e sto imparando czinkwe o sej lingwe",pl:"Kacper, z Polski, z Gdyni. Pracuję w porcie. Byłem w 43 krajach i uczę się 5-6 języków.",v:["Il trading è il mio hobby. – Trading to moje hobby.","Vorrei cambiare lavoro. (vorrej kambiare lavoro) – Chciałbym zmienić pracę."]},
      {who:"them",text:"Interessante! Ehi, il tuo italiano è davvero buono.",ph:"interessante! ej, il tuo italiano e davvero buono",pl:"Interesujące! Hej, twój włoski jest naprawdę dobry.",v:null},
      {who:"you",text:"Grazie! Cerco di imparare l\'italiano per parlare con persone come te, proprio come adesso.",ph:"gracje! czerko di imparare litaliano per parlare kon persone kome te, proprio kome adesso",pl:"Dziękuję! Staram się uczyć włoskiego, żeby rozmawiać z ludźmi takimi jak ty, właśnie tak jak teraz.",v:["Grazie, voglio parlare con persone come te. – Dzięki, chcę rozmawiać z ludźmi takimi jak ty.","Voglio esercitarmi con persone reali. (volio ezerczitarmi kon persone reali) – Chcę ćwiczyć z prawdziwymi ludźmi."]},
      {who:"them",text:"Incredibile! Hai Instagram?",ph:"inkredibile! aj instagram",pl:"Niesamowite! Masz Instagrama?",v:null},
      {who:"you",text:"Sì! Il mio è... È stato bello parlare con te!",ph:"si! il mio e... e stato bello parlare kon te",pl:"Tak! Mój to... Świetnie się gadało!",v:["Sì! Il mio è... È stato bello! – Tak! Mój to... Było świetnie!","Certo! È... A presto! (czerto! e... a presto) – Jasne! To... Do zobaczenia!"]},
    ]},
    samolot:{title:"Samolot",icon:"✈️",desc:"Sąsiad zagaduje podczas lotu.",lines:[
      {who:"them",text:"Ciao, sei di qui?",ph:"czao, sej di kwi",pl:"Cześć, jesteś stąd?",v:null},
      {who:"you",text:"No, dalla Polonia. Sono in vacanza. E tu?",ph:"no, dalla polonia. sono in vakanca. e tu",pl:"Nie, z Polski. Jestem na wakacjach. A ty?",v:["No, dalla Polonia. Sono in vacanza. – Nie, z Polski. Jestem na wakacjach.","Lavoro al porto di Gdynia. (al porto di gdinia) – Pracuję w porcie w Gdyni."]},
      {who:"them",text:"È la tua prima volta in Italia?",ph:"e la tua prima volta in italia",pl:"Czy to twój pierwszy raz we Włoszech?",v:null},

let lang = 'es';
let mode = 'cats';
let catF = 'greet';
let activeSc = null;

let known = {};

function knownKey(l, cat, i) { return `${l}|${cat}|${i}`; }

/* ═══════════════════════════════════════════════
   ACCENT / THEME
═══════════════════════════════════════════════ */
function applyAccent(l) {
  const cfg = LANG_CFG[l];
  const r = document.documentElement;
  r.style.setProperty('--acc',      cfg.color);
  r.style.setProperty('--acc-s',    cfg.soft);
  r.style.setProperty('--acc-b',    cfg.bd);
  r.style.setProperty('--acc-glow', cfg.soft.replace('.12', '.2'));
}

/* ═══════════════════════════════════════════════
   LANG / MODE / CAT
═══════════════════════════════════════════════ */
function setLang(l, btn) {
  // Save current scroll position and category before switching
  const scrollEl = document.querySelector('#panel-' + mode + ' .panel-body') ||
                   document.querySelector('#panel-' + mode);
  const savedScroll = scrollEl ? scrollEl.scrollTop : 0;

  // Keep current category if it exists in new language, else fall back to first
  const newLangCats = Object.keys(LANGS[l].categories);
  if (!newLangCats.includes(catF)) {
    catF = newLangCats[0];
  }

  lang = l; activeSc = null;
  clearSearch();
  document.querySelectorAll('.lang-btn').forEach(b => b.className = 'lang-btn');
  btn.classList.add('active-' + l);
  applyAccent(l);
  renderCurrent();
  renderSidebar();

  // Restore scroll after DOM settles
  const _restoreScroll = () => {
    const el = document.querySelector('#panel-' + mode + ' .panel-body') ||
               document.querySelector('#panel-' + mode);
    if (el) el.scrollTop = savedScroll;
  };
  _restoreScroll();
  requestAnimationFrame(_restoreScroll);
  setTimeout(_restoreScroll, 50);
}

function setMode(m, btn) {
  mode = m; activeSc = null;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + m).classList.add('active');

  // Show/hide search
  const sw = document.getElementById('search-wrap');
  if (sw) sw.style.display = m === 'cats' ? 'block' : 'none';

  if (m === 'quiz') { renderQuizSetup(); renderSidebar(); return; }
  renderCurrent();
  renderSidebar();
}

function setCat(c) {
  catF = c;
  clearSearch();
  renderSidebar();
  renderCats();
  updateCatsHeader();
  document.querySelector('#panel-cats .panel-body')?.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderCurrent() {
  if (mode === 'cats') {
    if (typeof catF === 'string' && catF.startsWith('__ch__')) {
      renderChapterPhrasesDesktop(parseInt(catF.replace('__ch__','')));
      return;
    }
    renderCats(); updateCatsHeader();
  }
  else if (mode === 'flow') renderFlow();
  else renderSc();
}

/* ═══════════════════════════════════════════════
   SEARCH
═══════════════════════════════════════════════ */
function onSearch(val) {
  searchQ = val.trim().toLowerCase();
  const sc = document.getElementById('search-clear');
  if (sc) sc.classList.toggle('show', searchQ.length > 0);
  renderCats();
  updateCatsHeader();
}
function clearSearch() {
  searchQ = '';
  const si = document.getElementById('search-input');
  if (si) si.value = '';
  const sc = document.getElementById('search-clear');
  if (sc) sc.classList.remove('show');
  if (mode === 'cats') { renderCats(); updateCatsHeader(); }
}

/* ═══════════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════════ */
function renderSidebar() {
  const nav = document.getElementById('sidebar-nav');
  const prog = document.getElementById('sidebar-progress');
  if (!nav) return;

  if (mode === 'cats') {
    const cats = Object.keys(LANGS[lang].categories);
    const total = cats.reduce((s,c) => s + LANGS[lang].categories[c].phrases.length, 0);
    const knownCount = cats.reduce((s,c) =>
      s + LANGS[lang].categories[c].phrases.filter((_,i) => known[knownKey(lang,c,i)]).length, 0);

    const chBtns = [1,2,3,4].map(ch => {
      const {knownCount, total} = getChapterProgress(ch);
      const isActive = catF === '__ch__' + ch;
      return `<button class="sb-nav-btn ${isActive?'active':''}" onclick="setCatChapterDesktop(${ch})"
        style="${isActive?'color:var(--acc);background:var(--acc-s);border-left:2px solid var(--acc)':''}">
        <span class="sb-icon">${CHAPTER_ICONS[ch]}</span>
        ${CHAPTER_NAMES[ch].replace('Rozdział ','Rozdz. ')}
        <span class="sb-count" style="font-size:9px">${knownCount}/${total}</span>
      </button>`;
    }).join('');

    nav.innerHTML =
      `<div class="sb-label">Rozdziały</div>` +
      chBtns +
      `<div class="sb-label" style="margin-top:.5rem">Kategorie</div>` +
      cats.map(c => {
        const count = LANGS[lang].categories[c].phrases.length;
        return `<button class="sb-nav-btn ${catF===c?'active':''}" onclick="setCat('${c}')">
          <span class="sb-icon">${CAT_ICONS[c]||'📌'}</span>
          ${CAT_LABELS[c]||c}
          <span class="sb-count">${count}</span>
        </button>`;
      }).join('');

    if (prog) {
      prog.style.display = 'block';
      document.getElementById('prog-value').textContent = `${knownCount}/${total}`;
      document.getElementById('prog-fill').style.width = total ? Math.round(knownCount/total*100)+'%' : '0%';
    }

  } else if (mode === 'flow') {
    nav.innerHTML =
      `<div class="sb-label">Kroki rozmowy</div>` +
      FLOW[lang].map((s,i) =>
        `<button class="sb-nav-btn" onclick="scrollToStep(${i})">
          <span class="sb-icon">${i+1}</span>${s.step}
        </button>`
      ).join('');
    if (prog) prog.style.display = 'none';

  } else if (mode === 'sc') {
    const scData = SCENARIOS[lang];
    nav.innerHTML =
      `<div class="sb-label">Scenariusze</div>` +
      Object.keys(scData).map(k =>
        `<button class="sb-nav-btn ${activeSc===k?'active':''}" onclick="showSc('${k}')">
          <span class="sb-icon">${scData[k].icon}</span>${scData[k].title}
        </button>`
      ).join('');
    if (prog) prog.style.display = 'none';
  } else if (mode === 'ch') {
    nav.innerHTML = '<div class="sb-label">Rozdziały</div><div style="padding:.5rem 1rem;font-size:12px;color:var(--tx3)">Wybierz rozdział i ucz się etapami</div>';
    if (prog) prog.style.display = 'none';
  } else if (mode === 'quiz') {
    const total = quizQuestions.length;
    const done = quizIdx;
    nav.innerHTML = `<div class="sb-label">Quiz</div>
      <div class="sb-quiz-stat">Język: <strong>${lang.toUpperCase()}</strong></div>
      ${quizState==='run'?`<div class="sb-quiz-stat">Pytanie: <strong>${done}/${total}</strong></div>
      <div class="sb-quiz-stat">Poprawne: <strong style="color:var(--acc)">${quizCorrect}</strong></div>`:''}
      ${quizState==='result'?`<div class="sb-quiz-stat">Wynik: <strong style="color:var(--acc)">${quizCorrect}/${total}</strong></div>`:''}
    `;
    if (prog) prog.style.display = 'none';
  }
}

function scrollToStep(i) {
  const el = document.getElementById('flow-step-' + i);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ═══════════════════════════════════════════════
   CATEGORIES PANEL
═══════════════════════════════════════════════ */
function updateCatsHeader() {
  const ld = LANGS[lang];
  const icon = document.getElementById('cats-hd-icon');
  const title = document.getElementById('cats-hd-title');
  const sub = document.getElementById('cats-hd-sub');
  const badge = document.getElementById('cats-hd-badge');
  if (!icon) return;

  if (searchQ) {
    icon.textContent = '🔍';
    title.textContent = `Szukasz: "${searchQ}"`;
    sub.textContent = 'Wyniki wyszukiwania';
  } else if (catF === 'all') {
    icon.textContent = '📚';
    title.textContent = 'Wszystkie zwroty';
    sub.textContent = 'Wszystkie kategorie';
  } else if (typeof catF === 'string' && catF.startsWith('__ch__')) {
    const ch = parseInt(catF.replace('__ch__', ''));
    icon.textContent = CHAPTER_ICONS[ch] || '📖';
    title.textContent = CHAPTER_NAMES[ch] || 'Rozdział';
    sub.textContent = 'Rozdział · Frazy';
  } else {
    icon.textContent = CAT_ICONS[catF] || '📌';
    title.textContent = CAT_LABELS[catF] || catF;
    sub.textContent = 'Kategoria · Frazy';
  }

  // count shown phrases
  const cats = catF === 'all' ? Object.keys(ld.categories) : [catF];
  let count = 0;
  cats.forEach(c => {
    let phrases = ld.categories[c].phrases;
    if (searchQ) phrases = phrases.filter(p =>
      [p.q, p.a, p.qt, p.at, p.qp].some(t => t && t.toLowerCase().includes(searchQ))
    );
    count += phrases.length;
  });
  if (badge) badge.textContent = count + ' fraz';
}

function renderCats() {
  const ld = LANGS[lang];
  const cats = Object.keys(ld.categories); // always show current single cat or all
  const showCats = catF === 'all' ? cats : [catF];
  const out = document.getElementById('phrases-out');
  if (!out) return;

  let html = '';
  let total = 0;

  showCats.forEach(cat => {
    const sec = ld.categories[cat];
    let phrases = sec.phrases;

    // Unknown filter
    if (showOnlyUnknown) {
      phrases = phrases.filter((p, idx) => !known[knownKey(lang, cat, idx)]);
    }

    if (searchQ) {
      phrases = phrases.filter(p =>
        [p.q, p.a, p.qt, p.at, p.qp].some(t => t && t.toLowerCase().includes(searchQ))
      );
    }
    if (!phrases.length) return;
    total += phrases.length;

    phrases.forEach(p => {
      const i = sec.phrases.indexOf(p);
      const key = knownKey(lang, cat, i);
      const id = `pc-${cat}-${i}`;
      const isKnown = !!known[key];
      const hasVar = p.v && p.v.length;

      html += `<div class="pcard ${lang}${isKnown?' known':''}${later[key]?' later':''}" id="${id}">
        <div class="pcard-inner">
          <div class="pcard-col">
            <div class="pcard-tag">Pytanie / zwrot</div>
            <div class="pcard-phrase">${p.q} ${ttsBtn(p.q,lang)}</div>
            <div class="pcard-phonetic">${p.qp}</div>
            <div class="pcard-translation">${p.qt}</div>
          </div>
          <div class="pcard-sep"></div>
          <div class="pcard-col">
            <div class="pcard-tag">Twoja odpowiedź</div>
            <div class="pcard-phrase">${p.a} ${ttsBtn(p.a,lang)}</div>
            <div class="pcard-phonetic">${p.ap}</div>
            <div class="pcard-translation">${p.at}</div>
          </div>
        </div>
        <div class="pcard-footer">
          <button class="know-btn${isKnown?' active':''}" id="${id}-kb" data-key="${key}" data-id="${id}" onclick="toggleKnownCh(this)">${isKnown?'✓ Znam':'+ Znam'}</button>
          <button class="later-btn${later[key]?' active':''}" id="${id}-lb" data-key="${key}" data-id="${id}" onclick="toggleLaterCh(this)">${later[key]?'↩ Wróć':'⏸ Później'}</button>
          ${hasVar ? `<button class="var-toggle" id="vt-${id}" onclick="toggleVar('vl-${id}','vt-${id}')">▼ warianty</button>` : ''}
        </div>
        ${hasVar ? `<div class="var-list" id="vl-${id}">
          ${p.v.map(v => `<div class="var-item">${v} ${ttsBtn(v.split(' – ')[0].replace(/\(.*?\)/g,'').trim(),lang)}</div>`).join('')}
        </div>` : ''}
      </div>`;
    });
  });

  if (!total) {
    html = `<div class="empty-state"><span class="em-icon">🔍</span>Brak wyników dla "<strong>${searchQ}</strong>"</div>`;
  }
  out.innerHTML = html;
}

/* ═══════════════════════════════════════════════
   FLOW PANEL
═══════════════════════════════════════════════ */
function renderFlow() {
  const out = document.getElementById('flow-out');
  if (!out) return;

  const sub = document.getElementById('flow-hd-sub');
  if (sub) sub.textContent = `${FLOW[lang].length} kroków rozmowy`;

  let html = '';
  FLOW[lang].forEach((sec, si) => {
    html += `<div id="flow-step-${si}" class="step-divider">
      <div class="step-line"></div>
      <div class="step-badge"><div class="step-num">${si+1}</div>${sec.step}</div>
      <div class="step-line"></div>
    </div>
    <div class="flow-col-headers">
      <div class="flow-col-label">Stranger</div>
      <div class="flow-col-label">Ty</div>
    </div>`;

    sec.exchanges.forEach((ex, ei) => {
      const key = knownKey(lang,'flow_'+si,ei);
      const id = `fe-${si}-${ei}`;
      const isKnown = !!known[key];
      const d = ei * 40;
      html += `<div class="flow-row${isKnown?' known':''}" id="${id}" style="animation-delay:${d}ms">
        <div class="bub-in-them ${lang}">
          <div class="bub-phrase">${ex.q} ${ttsBtn(ex.q,lang)}</div>
          <div class="bub-phonetic">${ex.qp}</div>
          <div class="bub-translation">${ex.qt}</div>
        </div>
        <div class="bub-in-you ${lang}">
          <div class="bub-phrase right">${ex.a} ${ttsBtn(ex.a,lang)}</div>
          <div class="bub-phonetic" style="text-align:right">${ex.ap}</div>
          <div class="bub-translation" style="text-align:right">${ex.at}</div>
          <div class="bub-you-footer">
            <button class="know-btn${isKnown?' active':''}" id="${id}-kb" onclick="toggleKnown('${key}','${id}')">${isKnown?'✓ Znam':'+ Znam'}</button>
          </div>
        </div>
      </div>`;
    });
  });

  out.innerHTML = html;
}

/* ═══════════════════════════════════════════════
   SCENARIUSZE PANEL
═══════════════════════════════════════════════ */
function renderSc() {
  const scData = SCENARIOS[lang];
  const cards = document.getElementById('sc-cards');
  if (!cards) return;

  cards.innerHTML = Object.keys(scData).map(k => {
    const s = scData[k];
    return `<div class="sc-card${activeSc===k?' active':''}" onclick="showSc('${k}')">
      <span class="sc-card-icon">${s.icon}</span>
      <div class="sc-card-title">${s.title}</div>
      <div class="sc-card-desc">${s.desc}</div>
    </div>`;
  }).join('');

  if (!activeSc || !scData[activeSc]) {
    document.getElementById('sc-dialog').innerHTML = `<div class="sc-hint">👆 Wybierz scenariusz</div>`;
    return;
  }

  const sc = scData[activeSc];
  let html = '<div class="sc-lines">';
  sc.lines.forEach((l, i) => {
    const d = i * 40;

const TTS_CONFIG = {
  es: { code:'es', rate:0.82 },
  de: { code:'de', rate:0.80 },
  fr: { code:'fr', rate:0.80 },
  ru: { code:'ru', rate:0.77 },
  it: { code:'it', rate:0.82 },
};

let ttsActive = null, ttsPlayId = 0;
let remoteAudio = null;

function stopAll() {
  if (remoteAudio) { remoteAudio.pause(); remoteAudio.src = ''; remoteAudio = null; }
  if (window.speechSynthesis) window.speechSynthesis.cancel();
}

function speak(text, langKey, btn) {
  // Toggle off
  if (ttsActive === btn) {
    stopAll(); ttsActive = null;
    document.querySelectorAll('.tts-btn').forEach(b => b.classList.remove('playing'));
    return;
  }

  // Stop previous
  stopAll();
  document.querySelectorAll('.tts-btn').forEach(b => b.classList.remove('playing'));
  ttsActive = btn;
  btn.classList.add('playing');
  const playId = ++ttsPlayId;

  const cfg = TTS_CONFIG[langKey] || { code: langKey, rate: 0.82 };
  const url = `https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=${cfg.code}&q=${encodeURIComponent(text.slice(0, 190))}`;

  const audio = new Audio();
  remoteAudio = audio;

  const cleanup = () => {
    if (playId !== ttsPlayId) return;
    btn.classList.remove('playing');
    if (ttsActive === btn) ttsActive = null;
    if (remoteAudio === audio) remoteAudio = null;
  };

  audio.onended = cleanup;
  audio.onerror = cleanup; // silent fail — no browser fallback to avoid double sound
  audio.src = url;
  audio.play().catch(cleanup);
}

function ttsBtn(text, lc) {
  const s = text.replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/`/g,'\\`');
  return `<button class="tts-btn" onclick="speak('${s}','${lc}',this)" title="Wymowa">🔊</button>`;
}

}

function buildQuizPool() {
  const ld = LANGS[lang];
  const cats = quizCat === 'all' ? Object.keys(ld.categories) : [quizCat];
  let pool = [];
  cats.forEach(cat => {
    ld.categories[cat].phrases.forEach(p => {
      pool.push({ qt: p.qt, q: p.q, qp: p.qp, a: p.a, ap: p.ap, at: p.at });
    });
  });
  // shuffle
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return pool.slice(0, quizCount === 999 ? pool.length : quizCount);
}

function buildDistractors(correct, allPhrases) {
  // Get 3 random wrong answers from the pool
  const others = allPhrases.filter(p => p.q !== correct.q);
  const shuffled = [...others].sort(() => Math.random() - .5);
  return shuffled.slice(0, 3);
}

function startQuiz() {
  const pool = buildQuizPool();
  if (pool.length < 4) {
    alert('Za mało fraz w tej kategorii (minimum 4). Wybierz więcej kategorii.');
    return;
  }
  quizQuestions = pool;
  quizIdx = 0;
  quizCorrect = 0;
  quizMistakes = [];
  quizState = 'run';
  quizAnswered = false;

  document.getElementById('quiz-setup').style.display = 'none';
  document.getElementById('quiz-run').style.display = 'block';
  document.getElementById('quiz-result').style.display = 'none';
  document.getElementById('quiz-lang-name').textContent = LANG_NAMES[lang] || lang.toUpperCase();

  renderQuizQuestion();
}

function renderQuizQuestion() {
  quizAnswered = false;
  const q = quizQuestions[quizIdx];
  const total = quizQuestions.length;

  // Progress
  const pct = Math.round(quizIdx / total * 100);
  document.getElementById('quiz-prog-fill').style.width = pct + '%';
  document.getElementById('quiz-prog-label').textContent = `${quizIdx + 1} / ${total}`;

  // Score badge
  const badge = document.getElementById('quiz-score-badge');
  badge.style.display = 'block';
  badge.textContent = `✓ ${quizCorrect} / ${quizIdx}`;

  // Sidebar update
  renderSidebar();

  // Question text (Polish)
  document.getElementById('quiz-q-text').textContent = q.qt || q.at;

  // Build 4 options: 1 correct + 3 distractors
  const distractors = buildDistractors(q, quizQuestions);
  let options = [
    { phrase: q, isCorrect: true },
    ...distractors.map(d => ({ phrase: d, isCorrect: false }))
  ].sort(() => Math.random() - .5);

  const letters = ['A', 'B', 'C', 'D'];
  const optContainer = document.getElementById('quiz-options');
  optContainer.innerHTML = options.map((opt, i) => `
    <button class="quiz-opt" id="qopt-${i}" onclick="selectAnswer(${i}, ${opt.isCorrect})">
      <div class="quiz-opt-letter">${letters[i]}</div>
      <div class="quiz-opt-body">
        <div class="quiz-opt-foreign">${opt.phrase.q}</div>
        <div class="quiz-opt-phonetic">${opt.phrase.qp}</div>
      </div>
    </button>
  `).join('');

  // Store correct index for TTS
  window._quizCorrectPhrase = q;
}

function selectAnswer(idx, isCorrect) {
  if (quizAnswered) return;
  quizAnswered = true;

  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(o => o.classList.add('disabled'));

  const selected = document.getElementById('qopt-' + idx);

  if (isCorrect) {
    selected.classList.add('correct');
    quizCorrect++;
    // Track consecutive correct for spaced repetition
    const qKey = window._quizCorrectPhrase.q;
    srCorrectStreak[qKey] = (srCorrectStreak[qKey] || 0) + 1;
  } else {
    selected.classList.add('wrong');
    // Find and highlight correct
    opts.forEach((o, i) => {
      const foreign = o.querySelector('.quiz-opt-foreign').textContent;
      if (foreign === window._quizCorrectPhrase.q) {
        o.classList.add('correct');
        // Add feedback
        const fb = document.createElement('div');
        fb.className = 'quiz-opt-feedback';
        fb.textContent = window._quizCorrectPhrase.at;
        o.querySelector('.quiz-opt-body').appendChild(fb);
      }
    });
    // Track mistake + spaced repetition: reinsert after 3 positions
    quizMistakes.push(window._quizCorrectPhrase);
    const srKey = window._quizCorrectPhrase.q;
    srCorrectStreak[srKey] = 0;
    const reinsertAt = Math.min(quizIdx + 3, quizQuestions.length);
    quizQuestions.splice(reinsertAt, 0, { ...window._quizCorrectPhrase, _sr: true });
    // Show SR indicator
    const srBadge = document.getElementById('quiz-sr-badge');
    if (srBadge) { srBadge.style.display = 'block'; srBadge.textContent = '🔄 Wróci za 3 pytania'; setTimeout(() => srBadge.style.display = 'none', 2000); }
  }

  // Play TTS of correct answer
  const ttsPhrase = window._quizCorrectPhrase.q;
  setTimeout(() => {
    const fakeBtn = { classList: { add: ()=>{}, remove: ()=>{} } };
    speak(ttsPhrase, lang, fakeBtn);
  }, 300);

  // Auto-advance after delay
  setTimeout(() => {
    quizIdx++;
    if (quizIdx >= quizQuestions.length) {
      showQuizResult();
    } else {
      renderQuizQuestion();
    }
  }, isCorrect ? 1000 : 2000);
}

function showQuizResult() {
  quizState = 'result';
  document.getElementById('quiz-run').style.display = 'none';
  document.getElementById('quiz-result').style.display = 'block';

  const total = quizQuestions.length;
  const pct = Math.round(quizCorrect / total * 100);

  const badge = document.getElementById('quiz-score-badge');
  badge.textContent = `✓ ${quizCorrect} / ${total}`;

  document.getElementById('quiz-result-score').textContent = `${quizCorrect} / ${total}`;
  document.getElementById('quiz-hd-sub').textContent = `Wynik: ${pct}%`;

  let emoji, sub;
  if (pct === 100)      { emoji = '🏆'; sub = 'Perfekcyjny wynik! Znasz te frazy na pamięć.'; }
  else if (pct >= 80)   { emoji = '🔥'; sub = 'Świetnie! Jeszcze trochę i będzie idealnie.'; }
  else if (pct >= 60)   { emoji = '💪'; sub = 'Nieźle! Wróć do błędnych fraz i powtórz.'; }
  else if (pct >= 40)   { emoji = '📚'; sub = 'Jest nad czym pracować. Nie poddawaj się!'; }
  else                   { emoji = '🌱'; sub = 'Dopiero zaczynasz. Regularne powtórki zrobią różnicę.'; }

  document.getElementById('quiz-result-emoji').textContent = emoji;
  document.getElementById('quiz-result-sub').textContent = sub;

  // Mistakes
  const mistakesEl = document.getElementById('quiz-mistakes');
  if (quizMistakes.length) {
    mistakesEl.innerHTML = `<div class="quiz-mistakes-title">❌ Błędne odpowiedzi (${quizMistakes.length})</div>` +
      quizMistakes.map(m => `
        <div class="quiz-mistake-item">
          <div class="quiz-mistake-q">${m.qt}</div>
          <div class="quiz-mistake-correct">${m.q} ${ttsBtn(m.q, lang)}</div>
          <div class="quiz-mistake-phonetic">${m.qp}</div>
        </div>
      `).join('');
  } else {
    mistakesEl.innerHTML = '';
  }

  // Show retry mistakes button
  const retryBtn = document.getElementById('quiz-retry-mistakes-btn');
  if (retryBtn) {
    if (quizMistakes.length > 0) {
      retryBtn.style.display = 'block';
      retryBtn.textContent = `❌ Ćwicz błędy (${quizMistakes.length})`;
    } else {
      retryBtn.style.display = 'none';
    }
  }

  renderSidebar();
}

function retryMistakes() {
  if (!quizMistakes.length) return;
  // Build a new quiz from mistakes only
  let pool = [...quizMistakes];
  // Need at least 4 for distractors — pad from current question pool if needed
  if (pool.length < 4) {
    const extra = quizQuestions.filter(q => !quizMistakes.find(m => m.q === q.q));
    pool = [...pool, ...extra.slice(0, 4 - pool.length)];
  }
  // Shuffle
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  quizQuestions = pool;
  quizIdx = 0; quizCorrect = 0; quizMistakes = []; quizAnswered = false;
  quizState = 'run';
  document.getElementById('quiz-result').style.display = 'none';
  document.getElementById('quiz-run').style.display = 'block';
  document.getElementById('quiz-lang-name').textContent = LANG_NAMES[lang] || lang.toUpperCase();
  renderQuizQuestion();
}

function restartQuiz() {
  startQuiz();
}

      ${hasVar?`<div class="var-list" id="vl-${id}">${p.v.map(v=>'<div class="var-item">'+escHtml(v)+'</div>').join('')}</div>`:''}
    </div>`;
  });
  grid.innerHTML = html;
}

function toggleKnownCh(btn) {
  const key = btn.dataset.key;
  const id = btn.dataset.id;
  toggleKnown(key, id);
}
function toggleLaterCh(btn) {
  const key = btn.dataset.key;
  const id = btn.dataset.id;
  toggleLater(key, id);
}

function startChapterQuiz(chNum) {
  // Switch to quiz mode with chapter filter
  const quizBtn = document.querySelector('.mode-btn[onclick*="quiz"]');
  setMode('quiz', quizBtn);
  // Start quiz for specific chapter
  const phrases = getChapterPhrases(chNum);
  quizQuestions = phrases.filter(({p}) => p.q && p.qt)
    .sort(() => Math.random() - .5)
    .slice(0, Math.min(phrases.length, 20));
  quizIdx = 0; quizCorrect = 0; quizState = 'run';
  renderQuizQuestion();
}

function openChapterM(chNum) {
  currentChapter = chNum;
  document.getElementById('ch-overview-m').style.display = 'none';
  document.getElementById('ch-phrases-view-m').style.display = 'block';
  document.getElementById('ch-phrases-title-m').textContent = CHAPTER_ICONS[chNum] + ' ' + CHAPTER_NAMES[chNum];
  renderChapterPhrasesM(chNum);
}

function showChapterOverviewM() {
  document.getElementById('ch-overview-m').style.display = 'block';
  document.getElementById('ch-phrases-view-m').style.display = 'none';
  renderChapterOverviewM();
}

function renderChapterPhrasesM(chNum) {
  const grid = document.getElementById('ch-cards-grid-m');
  if (!grid) return;
  const phrases = getChapterPhrases(chNum);
  if (!phrases.length) { grid.innerHTML = '<div style="text-align:center;color:var(--tx3);padding:2rem">Brak fraz</div>'; return; }
  let html = '';
  phrases.forEach(({ p, cat, i }) => {
    const key = knownKey(lang, cat, i);
    const id = lang + '-' + cat + '-' + i;
    const isKnown = !!known[key];

    html += `<div class="pcard ${lang}${isKnown?' known':''}${isLater?' later':''}" id="${id}" style="margin-bottom:10px">
      <div class="pcard-q-row" style="padding:.6rem .75rem .3rem">
        <div class="pcard-tag">Pytanie / zwrot</div>
        <div style="font-size:14px;font-weight:700;color:var(--tx);display:flex;align-items:center;gap:6px">${escHtml(p.q)} ${ttsBtn(p.q,lang)}</div>
        <div class="pcard-phonetic">${escHtml(p.qp||'')}</div>
        <div class="pcard-translation">${escHtml(p.qt||'')}</div>
      </div>
      <div style="height:1px;background:var(--bd)"></div>
      <div style="padding:.6rem .75rem .3rem">
        <div class="pcard-tag">Odpowiedź</div>
        <div style="font-size:14px;font-weight:700;color:var(--tx);display:flex;align-items:center;gap:6px">${escHtml(p.a||'')} ${ttsBtn(p.a||'',lang)}</div>
        <div class="pcard-phonetic">${escHtml(p.ap||'')}</div>
        <div class="pcard-translation">${escHtml(p.at||'')}</div>
      </div>
      <div style="padding:.4rem .75rem;border-top:1px solid var(--bd);background:var(--sf2);display:flex;gap:6px">
        <button class="know-btn${isKnown?' active':''}" id="${id}-kb" data-key="${key}" data-id="${id}" onclick="toggleKnownCh(this)">${isKnown?'✓ Znam':'+ Znam'}</button>
        <button class="later-btn${isLater?' active':''}" id="${id}-lb" data-key="${key}" data-id="${id}" onclick="toggleLaterCh(this)">${isLater?'↩ Wróć':'⏸ Później'}</button>
      </div>
    </div>`;
  });
  grid.innerHTML = html;
}


function setCatChapterDesktop(chNum) {
  catF = '__ch__' + chNum;
  showOnlyUnknown = false;
  searchQ = '';
  const si = document.getElementById('search-input');
  if (si) si.value = '';
  const cl = document.getElementById('search-clear');
  if (cl) cl.classList.remove('visible');

  // Make sure cats panel is visible
  if (mode !== 'cats') {
    mode = 'cats';
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-cats').classList.add('active');
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    const catsBtn = document.querySelector('.mode-btn[onclick*="cats"]');
    if (catsBtn) catsBtn.classList.add('active');
  }

  // Update header
  const phrases = getChapterPhrases(chNum);
  const icon = document.getElementById('cats-hd-icon');
  const title = document.getElementById('cats-hd-title');
  const sub = document.getElementById('cats-hd-sub');
  const badge = document.getElementById('cats-hd-badge');
  if (icon) icon.textContent = CHAPTER_ICONS[chNum];
  if (title) title.textContent = CHAPTER_NAMES[chNum];
  if (sub) sub.textContent = 'Rozdział · Frazy';
  if (badge) badge.textContent = phrases.length + ' fraz';

  renderChapterPhrasesDesktop(chNum);
  renderSidebar();
  if (typeof renderMobileCatChips === 'function') renderMobileCatChips();
}

function isMobile() {
  return window.innerWidth <= 768;
}

function renderMobileCatChips() {
  if (!isMobile()) return;
  const el = document.getElementById('cat-chips-mobile');
  if (!el) return;
  const cats = Object.keys(LANGS[lang].categories);

  // Chapter chips first
  const chChips = [1,2,3,4].map(ch => {
    const {knownCount, total} = getChapterProgress(ch);
    const isActive = catF === '__ch__' + ch;
    return `<button class="cat-chip-m${isActive?' active':''}" onclick="setCatChapterDesktop(${ch})">
      ${CHAPTER_ICONS[ch]} Rozdz.${ch} <span style="opacity:.6;font-size:10px;margin-left:4px">${knownCount}/${total}</span>
    </button>`;
  }).join('');

  const isChapter = typeof catF === 'string' && catF.startsWith('__ch__');
  const isAll = catF === 'all';

  el.innerHTML =
    `<button class="cat-chip-m ${isAll?'active':''}" onclick="setCatMobile('all')">Wszystkie</button>` +
    chChips +
    `<div style="width:1px;height:20px;background:var(--bd);flex-shrink:0;align-self:center"></div>` +
    cats.map(cat =>
      `<button class="cat-chip-m ${(!isChapter && !isAll && catF===cat)?'active':''}" onclick="setCatMobile('${cat}')">
        ${CAT_ICONS[cat]||''} ${CAT_LABELS[cat]||cat}
      </button>`
    ).join('');
}

function renderMobileChChips() {
  renderMobileCatChips(); // merged into single row
}

function setCatMobile(cat) {
  catF = cat;
  renderMobileCatChips();
  renderCats();
  updateCatsHeader();
}

function updateMobileProgress() {
  if (!isMobile()) return;
  const cats = LANGS[lang].categories;
  let total = 0, knownCount = 0;
  Object.keys(cats).forEach(cat => {
    const phrases = cats[cat].phrases || [];
    total += phrases.length;
    phrases.forEach((p, i) => { if (known[knownKey(lang, cat, i)]) knownCount++; });
  });
  const pct = total ? Math.round(knownCount / total * 100) : 0;
  const fill = document.getElementById('mobile-prog-fill');
  const val = document.getElementById('mobile-prog-value');
  if (fill) fill.style.width = pct + '%';
  if (val) val.textContent = knownCount + '/' + total;
}

// updateMobileProgress is called directly from updateProgress override below

// renderCats mobile chips called via DOMContentLoaded

// setLang mobile handled via direct calls





// Init mobile on load
window.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    updateMobileProgress();
    if (isMobile()) {
      renderMobileCatChips();
      updateCatsHeader();
    }
  }, 80);
});

// Handle resize
window.addEventListener('resize', () => {
  if (isMobile()) {
    renderMobileCatChips();
    renderMobileChChips();
    updateMobileProgress();
  }
});
